[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[etherscan]
polkadot-testnet = { key = "", url = "https://blockscout-testnet.polkadot.io/api?" }

[rpc_endpoints]
polkadot_testnet = "https://services.polkadothub-rpc.com/testnet"
polkadot_mainnet = "https://services.polkadothub-rpc.com/mainnet"
